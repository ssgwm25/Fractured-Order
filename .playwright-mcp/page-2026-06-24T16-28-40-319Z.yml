                - paragraph [ref=e751]:
                  - text: "The web delivery layer for running the game live: a"
                  - strong [ref=e752]: Vite
                  - text: frontend with a
                  - strong [ref=e753]: Supabase
                  - text: backend, session-code access, realtime state push, and JSON export of game state for post-game analysis. Teams join by session code and select their team and role from the landing page.
                - paragraph [ref=e754]:
                  - text: Dedicated facilitator, notetaker, and scribe role surfaces live under
                  - code [ref=e755]: teams/<team>/
                  - text: . Scribe shells share the common modal stylesheet so logout and confirmation dialogs render consistently with the rest of the platform.
                - paragraph [ref=e756]:
                  - text: Platform entry-point HTML files use
                  - code [ref=e757]: src/img/FO_icon.ico
                  - text: as the browser favicon, with nested team and deck pages referencing the asset by relative path.
                - paragraph [ref=e758]:
                  - text: Each role surface mounts a role-specific onboarding guide above the sidebar session label. The guide explains the role's main workflow plus the live move, phase, and timer indicators. When collapsed or completed, it remains available as
                  - code [ref=e759]: Start Here
                  - text: so users can reopen the role reference without logging out and joining again.
                - paragraph [ref=e760]: The White Cell guide explicitly walks operators through game controls, session operations, Blue actions, Green proposals, Red move responses, Tribe Street Journal, Verba AI sentiment updates, RFIs, communications, the session timeline, and queue notification muting.
                - paragraph [ref=e761]: The Blue facilitator guide explicitly walks facilitators through strategic actions, RFIs, White Cell responses, received proposals, Tribe Street Journal, Verba AI sentiment updates, the timeline, and Quick Capture.
                - paragraph [ref=e762]: The Green facilitator guide follows the same full tour pattern with proposal-specific guidance for drafting, White Cell review, forwarded proposal responses, RFIs, updates, timeline review, and Quick Capture.
                - paragraph [ref=e763]: The Red facilitator guide follows the same full tour pattern with move-response-specific guidance for responding to Blue moves, White Cell review, forwarded proposals, RFIs, updates, timeline review, and Quick Capture.
                - paragraph [ref=e764]:
                  - text: The facilitator
                  - code [ref=e765]: Responses
                  - text: feed separates direct White Cell communications, RFI answers, White Cell updates, and forwarded proposals into horizontal labelled groups so facilitators can scan each response type independently.
                - paragraph [ref=e766]: Game Master and White Cell operators can create and delete live sessions from their admin surfaces. Participant rosters are scoped and labeled by the selected or active session so operators can distinguish seats across concurrent exercises.
                - paragraph [ref=e767]: White Cell scribe deck controls render default team decks immediately while live communications hydrate. Browser-uploaded decks remain same-device cache assignments; blocked browser storage and stalled repo deck validation must fail with an operator-visible error rather than leaving the deck workflow in a loading state.
                - paragraph [ref=e768]:
                  - text: Scribe deck navigation is split into distinct
                  - code [ref=e769]: Actions
                  - text: and
                  - code [ref=e770]: Deck
                  - text: "groups with a deliberate spacer between them. The section nav follows the minimalist facilitator sidebar pattern: unframed groups, compact rows, a single current-row rail marker, and no separate accented action-card treatment. Each section can be expanded or collapsed independently; closing the active section must not force another section open."
                - paragraph [ref=e771]: White Cell operators can mute queue arrival notifications from the header. Muting suppresses the toast interruption only; sidebar counts and in-queue NEW labels remain visible so adjudication awareness is not lost.
                - paragraph [ref=e772]: The Blue Team action builder includes inline helper text for Objective and Expected Outcomes so facilitators distinguish intended goals from anticipated downstream effects.
