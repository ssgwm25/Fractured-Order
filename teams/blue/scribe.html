<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Statecraft Sim Blue Team facilitator support deck.">
    <title>Statecraft Sim | Blue Team Facilitator</title>
    <link rel="icon" type="image/x-icon" href="../../src/img/FO_icon.ico">

    <link rel="stylesheet" href="../../styles/base/reset.css">
    <link rel="stylesheet" href="../../styles/base/variables.css">
    <link rel="stylesheet" href="../../styles/base/typography.css">
    <link rel="stylesheet" href="../../styles/components/buttons.css">
    <link rel="stylesheet" href="../../styles/components/badges.css">
    <link rel="stylesheet" href="../../styles/components/modals.css">
    <link rel="stylesheet" href="../../styles/components/loader.css">
    <link rel="stylesheet" href="../../styles/layouts/header.css">
    <link rel="stylesheet" href="../../styles/pages/scribe.css">
</head>
<body data-team="blue" data-role-surface="scribe" data-scribe-presentation="standard">
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div class="scribe-shell">
        <header class="page-header" id="pageHeader">
            <div class="header-left">
                <button class="header-menu-btn btn btn-ghost btn-icon-only" id="menuToggle" aria-label="Toggle menu">
                    <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" focusable="false">
                        <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"></path>
                    </svg>
                </button>
                <div class="header-session-info">
                    <span class="session-role" id="sessionRoleLabel">Facilitator</span>
                    <span class="session-indicator" id="connectionIndicator"></span>
                </div>
            </div>

            <div class="header-center">
                <div class="header-game-state">
                    <div class="game-state-item">
                        <span class="game-state-label">Move</span>
                        <span class="game-state-value" id="headerMove">1</span>
                    </div>
                    <div class="game-state-item">
                        <span class="game-state-label">Phase</span>
                        <span class="game-state-value" id="headerPhase">Internal Deliberation</span>
                    </div>
                </div>
                <div class="header-timer">
                    <span class="timer-display" id="timerDisplay">90:00</span>
                    <span class="timer-status" id="timerStatus">Paused</span>
                </div>
            </div>

            <div class="header-right">
                <div class="header-actions">
                    <div class="scribe-alerts" id="scribeAlerts">
                        <button class="btn btn-ghost btn-sm btn-icon-only scribe-alerts-btn" id="scribeAlertsBtn" type="button" aria-haspopup="dialog" aria-controls="scribeAlertsPanel" aria-expanded="false" aria-label="Simulation activity">
                            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" focusable="false">
                                <path d="M10 2a5 5 0 00-5 5v2.59l-1.3 2.6A1 1 0 004.6 14h10.8a1 1 0 00.9-1.45L15 9.17V7a5 5 0 00-5-5zM8.07 15.5a2 2 0 003.86 0H8.07z"/>
                            </svg>
                            <span class="scribe-alerts-badge" id="scribeAlertsBadge" hidden>0</span>
                        </button>
                        <div class="scribe-alerts-panel" id="scribeAlertsPanel" role="dialog" aria-modal="true" aria-labelledby="scribeAlertsTitle" tabindex="-1" hidden>
                            <div class="scribe-alerts-panel-head">
                                <span id="scribeAlertsTitle">Simulation Activity</span>
                                <div class="scribe-alerts-panel-actions">
                                    <button class="scribe-alerts-clear" id="scribeAlertsClear" type="button">Clear</button>
                                    <button class="scribe-alerts-close" id="scribeAlertsClose" type="button">Close</button>
                                </div>
                            </div>
                            <div class="scribe-alerts-list" id="scribeAlertsList"></div>
                        </div>
                    </div>
                    <button class="btn btn-ghost btn-sm" id="presentBtn" type="button">Present</button>
                    <button class="btn btn-ghost btn-sm" id="logoutBtn" type="button">Logout</button>
                </div>
            </div>
        </header>

        <div class="scribe-body">
            <aside class="scribe-sidebar" id="sidebar">
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Collapse section navigation">
                    <svg viewBox="0 0 20 20" fill="currentColor" class="sidebar-toggle-icon" aria-hidden="true" focusable="false">
                        <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                    </svg>
                </button>

                <nav class="scribe-section-nav" aria-label="Facilitator deck sections">
                    <div id="scribeSectionList"></div>
                </nav>
                <div class="sidebar-session">
                    <span class="sidebar-session-label">Session</span>
                    <span class="sidebar-session-name" id="sessionName">Loading...</span>
                </div>
            </aside>

            <div class="sidebar-overlay" id="sidebarOverlay"></div>

            <main class="scribe-main" id="main-content">
                <section class="scribe-stage-card" aria-label="Facilitator support deck viewer">
                    <div class="scribe-stage-frame">
                        <button class="scribe-stage-nav scribe-stage-nav--prev" id="prevSlideBtn" type="button" aria-label="Previous slide">
                            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" focusable="false">
                                <path fill-rule="evenodd" d="M12.707 15.707a1 1 0 01-1.414 0l-5-5a1 1 0 010-1.414l5-5a1 1 0 111.414 1.414L8.414 10l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"></path>
                            </svg>
                        </button>

                        <div class="scribe-stage-state" id="deckStatePanel" role="status" aria-live="polite">
                            <div class="scribe-stage-state-card">
                                <h3 id="deckStateTitle">Loading support deck</h3>
                                <p id="deckStateMessage">Pulling the assigned support deck into the facilitator surface.</p>
                                <button class="btn btn-secondary btn-sm" id="deckRetryBtn" type="button" hidden>Retry</button>
                            </div>
                        </div>

                        <div class="scribe-stage-image-shell" id="deckImageFrame" hidden>
                            <div class="scribe-stage-image-wrap">
                                <img id="deckSlideImage" alt="">
                            </div>
                        </div>

                        <div class="scribe-stage-action-shell" id="deckActionFrame" hidden></div>

                        <button class="scribe-stage-nav scribe-stage-nav--next" id="nextSlideBtn" type="button" aria-label="Next slide">
                            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" focusable="false">
                                <path fill-rule="evenodd" d="M7.293 4.293a1 1 0 011.414 0l5 5a1 1 0 010 1.414l-5 5a1 1 0 01-1.414-1.414L11.586 10 7.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                            </svg>
                        </button>
                    </div>

                </section>
            </main>
        </div>
    </div>

    <div class="sr-only" id="slideAnnouncement" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="../../src/main.js"></script>
    <script type="module" src="../../src/roles/scribe.js"></script>
</body>
</html>
